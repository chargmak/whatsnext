# Supabase CLI project config.
# `project_id` is the project ref (public, appears in your project URL).
project_id = "vtftqdsltwernbjvewqm"

# The reminder jobs authenticate callers themselves via CRON_SECRET, so they do
# not use Supabase's built-in JWT gate. Deploy them with JWT verification disabled.
[functions.send-release-reminders]
verify_jwt = false

[functions.send-episode-alerts]
verify_jwt = false
